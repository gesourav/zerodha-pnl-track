<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container dark-theme">
        <header>
            <div class="logo">
                <span class="pulse"></span> P&L Sentinel
            </div>
            <button id="settingsBtn" class="icon-btn">⚙️</button>
        </header>

        <main id="mainView">
            <div class="section-title">Open FnO Positions</div>
            <div id="positionsList" class="positions-list">
                <!-- Dynamically populated -->
            </div>
            
            <div class="create-group-box">
                <div class="input-group" style="margin-bottom: 0;">
                    <label id="lblGroupName">Group Name</label>
                    <input type="text" id="groupName" placeholder="e.g. BankNifty Straddle" />
                </div>
                <div class="thresholds">
                    <div class="input-group" style="margin-bottom: 0; flex: 1;">
                        <label id="lblGroupTarget">Target (₹)</label>
                        <input type="number" id="groupTarget" placeholder="500" />
                    </div>
                    <div class="input-group" style="margin-bottom: 0; flex: 1;">
                        <label id="lblGroupSL">Stoploss (₹)</label>
                        <input type="number" id="groupSL" placeholder="-200" />
                    </div>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button id="createGroupBtn" class="primary-btn" style="flex: 1; width: auto;">Create Group</button>
                    <button id="cancelEditBtn" class="secondary-btn hidden" style="flex: 1; width: auto;">Cancel</button>
                </div>
            </div>

            <div class="section-title">Active Groups</div>
            <div id="groupsList" class="groups-list">
                <!-- Dynamically populated -->
            </div>
        </main>

        <main id="settingsView" class="hidden">
            <div class="section-title">Telegram Settings</div>
            <div class="input-group">
                <label>Bot Token</label>
                <input type="password" id="botToken" placeholder="123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11" />
            </div>
            <div class="input-group">
                <label>Chat ID</label>
                <input type="text" id="chatId" placeholder="123456789" />
            </div>
            <button id="saveSettingsBtn" class="primary-btn">Save Settings</button>
            <button id="backBtn" class="secondary-btn" style="margin-top: 8px;">Back</button>
        </main>
    </div>
    <script src="popup.js"></script>
</body>
</html>
